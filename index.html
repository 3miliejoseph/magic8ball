<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic 8 Ball</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&family=Oswald:wght@300&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a12;
    --deep: #06060f;
    --glow-blue: #4fc3f7;
    --glow-purple: #b39ddb;
    --triangle-bg: #0d1b4b;
    --answer-color: #90caf9;
    --hint-color: rgba(179, 157, 219, 0.55);
  }

  html { height: 100%; overflow: hidden; }
  body {
    height: 100%;
    background: var(--deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    overflow: visible;
    user-select: none;
    -webkit-user-select: none;
  }



  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    opacity: var(--o, 0.4);
  }
  @keyframes twinkle {
    from { opacity: var(--o, 0.4); transform: scale(1); }
    to { opacity: calc(var(--o, 0.4) * 0.3); transform: scale(0.6); }
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3rem;
    margin-top: -3rem;
  }

  .title {
    font-family: 'Yusei Magic', sans-serif;
    font-size: clamp(1.4rem, 5.5vw, 2.2rem);
    color: var(--glow-purple);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 0 30px rgba(179,157,219,0.5);
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 0.4s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .ball-wrap {
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .ball-wrap:active .ball { transform: scale(0.96); }

  .ball-shadow {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 28px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 72%);
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
    animation: shadowPulse 3s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.55; }
    50% { transform: translateX(-50%) scaleX(1.08); opacity: 0.4; }
  }

  .ball {
    width: clamp(220px, 55vw, 300px);
    height: clamp(220px, 55vw, 300px);
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 32%, rgba(255,255,255,0.13) 0%, transparent 35%),
      radial-gradient(circle at 68% 70%, rgba(0,0,0,0.55) 0%, transparent 40%),
      radial-gradient(circle at 50% 48%, #1c1c30 0%, #0d0d1f 45%, #050510 80%, #010106 100%);
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.04),
      0 0 40px rgba(79,195,247,0.18),
      0 0 90px rgba(79,195,247,0.07),
      inset 0 -6px 20px rgba(0,0,0,0.95),
      inset 0 4px 10px rgba(255,255,255,0.05),
      0 18px 40px rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: ballFloat 4s ease-in-out infinite;
  }
  @keyframes ballFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  .ball-wrap:active .ball { animation: none; transform: scale(0.96) translateY(2px); }

  .ball::before {
    content: '';
    position: absolute;
    top: 10%;
    left: 20%;
    width: 32%;
    height: 20%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 50%, transparent 80%);
    border-radius: 50%;
    transform: rotate(-30deg);
    pointer-events: none;
    filter: blur(2px);
  }

  .ball::after {
    content: '';
    position: absolute;
    bottom: 14%;
    right: 18%;
    width: 14%;
    height: 8%;
    background: radial-gradient(ellipse, rgba(79,195,247,0.18) 0%, transparent 80%);
    border-radius: 50%;
    pointer-events: none;
    filter: blur(3px);
  }

  .eight-circle {
    position: absolute;
    width: 50%;
    height: 50%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #ffffff 0%, #e8e8e8 60%, #d0d0d0 100%);
    box-shadow:
      0 2px 8px rgba(0,0,0,0.6),
      inset 0 1px 2px rgba(255,255,255,0.9),
      inset 0 -2px 4px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.3s ease;
    z-index: 2;
  }

  .eight-num {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(3rem, 11vw, 5rem);
    font-weight: 300;
    transform: scaleX(1.3);
    color: #0a0a0a;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    line-height: 1;
    user-select: none;
  }

  .window {
    position: absolute;
    width: 56%;
    height: 56%;
    border-radius: 50%;
    background: radial-gradient(circle at 45% 42%, #07090e 0%, #020305 100%);
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow:
      inset 0 3px 18px rgba(0,0,0,0.98),
      inset 0 -1px 4px rgba(0,0,0,0.8),
      0 0 0 2px rgba(0,0,0,0.7);
    z-index: 2;
    opacity: 0;
    transition: opacity 0.45s ease;
  }

  .ball.revealed .eight-circle { opacity: 0; }
  .ball.revealed .window { opacity: 1; }

  .ball.shaking {
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) var(--shake-count, 3) both;
  }
  @keyframes shake {
    10%, 90%  { transform: rotate(-2deg) scale(0.98); }
    20%, 80%  { transform: rotate(3deg) scale(1.01); }
    30%, 50%, 70% { transform: rotate(-4deg) scale(0.97); }
    40%, 60%  { transform: rotate(4deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .hint {
    font-size: clamp(0.78rem, 2.5vw, 0.93rem);
    font-family: 'Yusei Magic', sans-serif;
    color: var(--hint-color);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.7;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.4s;
    max-width: 280px;
  }

</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="scene">
  <div class="title">Magic 8 Ball</div>

  <div class="ball-wrap" id="ballWrap">
    <div class="ball-shadow"></div>
    <div class="ball" id="ball">
      <div class="eight-circle">
        <span class="eight-num">8</span>
      </div>
      <div class="window" id="window">
        <svg id="ballSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
          <defs>
            <linearGradient id="tg" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#3b6aee"/>
              <stop offset="55%" stop-color="#1a44cc"/>
              <stop offset="100%" stop-color="#0a2080"/>
            </linearGradient>
            <clipPath id="triClip">
              <polygon points="9,26 91,26 50,97"/>
            </clipPath>
          </defs>
          <polygon points="9,26 91,26 50,97" fill="url(#tg)"/>
          <g id="triText" clip-path="url(#triClip)"></g>
        </svg>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">
    <span id="hintText">Shake to Reveal</span>
  </div>

</div>

<script>
const answers = [
  { text: "It is certain", tone: "yes" },
  { text: "Without a doubt", tone: "yes" },
  { text: "Yes, definitely", tone: "yes" },
  { text: "You may rely on it", tone: "yes" },
  { text: "Of course", tone: "yes" },
  { text: "Most likely", tone: "yes" },
  { text: "Outlook good", tone: "yes" },
  { text: "Signs point to yes", tone: "yes" },
  { text: "Yes", tone: "yes" },
  { text: "Absolutely", tone: "yes" },
  { text: "Try again", tone: "maybe" },
  { text: "Ask again later", tone: "maybe" },
  { text: "Better not tell you now", tone: "maybe" },
  { text: "Cannot predict now", tone: "maybe" },
  { text: "Uncertain", tone: "maybe" },
  { text: "Don't count on it", tone: "no" },
  { text: "My reply is no", tone: "no" },
  { text: "My sources say no", tone: "no" },
  { text: "Outlook not so good", tone: "no" },
  { text: "Very doubtful", tone: "no" },
  { text: "No", tone: "no" },
];

let revealed = false;
let cooldown = false;
let isMobile = false;

function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --o:${(Math.random()*0.5+0.1).toFixed(2)};
      --d:${(Math.random()*3+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    c.appendChild(s);
  }
}

function getAnswer() {
  return answers[Math.floor(Math.random() * answers.length)];
}

function layoutTriangleText(phrase) {
  const g = document.getElementById('triText');
  const svg = document.getElementById('ballSvg');
  g.innerHTML = '';

  // Triangle: top-left(9,26) top-right(91,26) tip(50,97)
  const TY = 26, BY = 97, CX = 50;
  const TOP_HW = 41, H = BY - TY;
  const PAD = 3.0; // generous padding so text stays visually inside

  // Available width at a given y baseline
  const avail = y => Math.max(0, 2 * TOP_HW * (BY - y) / H - PAD * 2);

  const words = phrase.split(' ');

  // Forced 2-line splits for specific phrases that need to be bigger
  const forcedSplits = {
    'It is certain': ['It is', 'certain'],
    'Yes, definitely': ['Yes,', 'Definitely'],
    'Very doubtful': ['Very', 'doubtful'],
  };
  const forcedLines = forcedSplits[phrase] || null;

  const tmp = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  tmp.setAttribute('font-family', 'Cinzel, serif');
  tmp.setAttribute('font-weight', '400');
  tmp.setAttribute('visibility', 'hidden');
  svg.appendChild(tmp);

  function measure(str, fs) {
    tmp.setAttribute('font-size', fs);
    tmp.textContent = str;
    return tmp.getComputedTextLength();
  }

  // For a given fontSize and line count n, compute centered y positions,
  // then greedily assign words to lines checking width at each final y.
  function tryLayout(fs, n) {
    const lineH = fs * 1.38;
    const blockH = (n - 1) * lineH;
    // Center the block: use visual centroid of triangle (1/3 from base = 2/3 from tip)
    const midY = TY + (BY - TY) * 0.42;
    const firstY = midY - blockH / 2 + fs * 0.26;

    // All y positions must be within triangle bounds
    const lastY = firstY + blockH;
    if (firstY - fs * 0.72 < TY + 1) return null; // top cap above triangle
    if (lastY + fs * 0.2 > BY - 1) return null;    // descender below tip

    // Pre-compute y positions and their available widths
    const yPos = Array.from({length: n}, (_, i) => firstY + i * lineH);
    const widths = yPos.map(y => avail(y));
    if (widths.some(w => w <= 0)) return null;

    // Greedily assign words to lines
    const lines = [];
    let wi = 0;
    for (let i = 0; i < n; i++) {
      const maxW = widths[i];
      let cur = [];
      while (wi < words.length) {
        const next = [...cur, words[wi]].join(' ');
        if (cur.length > 0 && measure(next, fs) > maxW) break;
        // Single word wider than slot — fail
        if (cur.length === 0 && measure(words[wi], fs) > maxW) return null;
        cur.push(words[wi++]);
      }
      if (cur.length === 0) return null;
      lines.push({ text: cur.join(' '), y: yPos[i] });
    }
    if (wi < words.length) return null; // leftover words didn't fit
    return lines;
  }

  // For forced splits: find largest font where both pre-split lines fit their y-slots
  function tryForcedLayout(fs) {
    const n = forcedLines.length;
    const lineH = fs * 1.38, blockH = (n - 1) * lineH;
    const midY = TY + (BY - TY) * 0.42;
    const firstY = midY - blockH / 2 + fs * 0.26;
    const lastY = firstY + blockH;
    if (firstY - fs * 0.72 < TY + 1) return null;
    if (lastY + fs * 0.2 > BY - 1) return null;
    const yPos = Array.from({length: n}, (_, i) => firstY + i * lineH);
    for (let i = 0; i < n; i++) {
      if (measure(forcedLines[i], fs) > avail(yPos[i])) return null;
    }
    return forcedLines.map((text, i) => ({ text, y: yPos[i] }));
  }

  // Binary search: start from the "Try again" floor size
  let lo = _minFontSize, hi = 17, bestFs = _minFontSize, bestLines = null;

  if (forcedLines) {
    // For forced-split phrases: find largest font where the forced lines fit
    // Allow going below _minFontSize if needed so it never renders blank
    lo = 3;
    for (let iter = 0; iter < 24; iter++) {
      const fs = (lo + hi) / 2;
      const found = tryForcedLayout(fs);
      if (found) { bestFs = fs; bestLines = found; lo = fs; } else hi = fs;
    }
  } else {
    // Seed with the minimum size first
    for (let n = 1; n <= 10 && !bestLines; n++) bestLines = tryLayout(_minFontSize, n);
    if (bestLines) bestFs = _minFontSize;

    // Search upward from the floor
    for (let iter = 0; iter < 24; iter++) {
      const fs = (lo + hi) / 2;
      let found = null;
      for (let n = 1; n <= 10 && !found; n++) found = tryLayout(fs, n);
      if (found) { bestFs = fs; bestLines = found; lo = fs; } else hi = fs;
    }

    // If still nothing fits (very long phrase), fall back to unconstrained search
    if (!bestLines) {
      lo = 3; hi = _minFontSize; bestFs = 3;
      for (let iter = 0; iter < 24; iter++) {
        const fs = (lo + hi) / 2;
        let found = null;
        for (let n = 1; n <= 10 && !found; n++) found = tryLayout(fs, n);
        if (found) { bestFs = fs; bestLines = found; lo = fs; } else hi = fs;
      }
    }
  }

  svg.removeChild(tmp);
  if (!bestLines) return;

  for (const line of bestLines) {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', CX);
    t.setAttribute('y', line.y);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', bestFs);
    t.setAttribute('fill', '#ffffff');
    t.setAttribute('font-family', 'Cinzel, serif');
    t.setAttribute('font-weight', '400');
    t.textContent = line.text;
    g.appendChild(t);
  }
}

// Wait for fonts before any layout call
const _fontReady = document.fonts ? document.fonts.ready : Promise.resolve();

// Compute the minimum font size using "Try again" as the floor
let _minFontSize = 3;
_fontReady.then(() => {
  // Temporarily run layoutTriangleText logic for "Try again" to find its font size
  const svg = document.getElementById('ballSvg');
  const TY = 26, BY = 97, CX = 50, TOP_HW = 41, H = BY - TY, PAD = 3.0;
  const avail = y => Math.max(0, 2 * TOP_HW * (BY - y) / H - PAD * 2);
  const words = ['Try', 'again'];
  const tmp = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  tmp.setAttribute('font-family', 'Cinzel, serif');
  tmp.setAttribute('font-weight', '400');
  tmp.setAttribute('visibility', 'hidden');
  svg.appendChild(tmp);
  function measure(str, fs) { tmp.setAttribute('font-size', fs); tmp.textContent = str; return tmp.getComputedTextLength(); }
  function tryLayout(fs, n) {
    const lineH = fs * 1.38, blockH = (n - 1) * lineH;
    const midY = TY + (BY - TY) * 0.42;
    const firstY = midY - blockH / 2 + fs * 0.26;
    const lastY = firstY + blockH;
    if (firstY - fs * 0.72 < TY + 1) return null;
    if (lastY + fs * 0.2 > BY - 1) return null;
    const yPos = Array.from({length: n}, (_, i) => firstY + i * lineH);
    const widths = yPos.map(y => avail(y));
    if (widths.some(w => w <= 0)) return null;
    const lines = []; let wi = 0;
    for (let i = 0; i < n; i++) {
      const maxW = widths[i]; let cur = [];
      while (wi < words.length) {
        const next = [...cur, words[wi]].join(' ');
        if (cur.length > 0 && measure(next, fs) > maxW) break;
        if (cur.length === 0 && measure(words[wi], fs) > maxW) return null;
        cur.push(words[wi++]);
      }
      if (cur.length === 0) return null;
      lines.push({ text: cur.join(' '), y: yPos[i] });
    }
    if (wi < words.length) return null;
    return lines;
  }
  let lo = 3, hi = 17, best = 5;
  for (let iter = 0; iter < 24; iter++) {
    const fs = (lo + hi) / 2;
    let found = null;
    for (let n = 1; n <= 10 && !found; n++) found = tryLayout(fs, n);
    if (found) { best = fs; lo = fs; } else hi = fs;
  }
  svg.removeChild(tmp);
  _minFontSize = best;
});

function reveal() {
  if (cooldown) return;

  // If already revealed, reset first then re-reveal
  if (revealed) {
    const ball = document.getElementById('ball');
    ball.classList.remove('revealed');
    document.getElementById('triText').innerHTML = '';
    revealed = false;
  }

  cooldown = true;
  const ball = document.getElementById('ball');

  // Match shake duration to the audio clip length (use cached value from _audioDurationMs)
  const shakeDuration = _audioDurationMs;
  // Each shake cycle is 0.5s — repeat enough times to fill the audio
  const shakeCount = Math.max(1, Math.round(shakeDuration / 500));

  // Apply dynamic shake animation duration
  ball.style.setProperty('--shake-duration', shakeDuration + 'ms');
  ball.style.setProperty('--shake-count', shakeCount);
  ball.classList.add('shaking');
  playShakeSound();

  setTimeout(() => {
    ball.classList.remove('shaking');
    ball.style.removeProperty('--shake-duration');
    ball.style.removeProperty('--shake-count');
    const a = getAnswer();
    _fontReady.then(() => {
      layoutTriangleText(a.text);
      ball.classList.add('revealed');
      revealed = true;
      cooldown = false;
    });
  }, shakeDuration);
}

// Shake sound from provided MP3

_shakeAudio.preload = 'auto';
_shakeAudio.addEventListener('loadedmetadata', () => {
  if (_shakeAudio.duration && isFinite(_shakeAudio.duration)) {
    _audioDurationMs = Math.round(_shakeAudio.duration * 1000);
  }
});
function playShakeSound() {
  try {
    const s = _shakeAudio.cloneNode();
    s.volume = 1.0;
    s.play().catch(() => {});
  } catch(e) {}
}

document.getElementById('ballWrap').addEventListener('click', reveal);
document.getElementById('ballWrap').addEventListener('touchend', (e) => {
  e.preventDefault();
  reveal();
}, { passive: false });

let lastShake = 0;
let shakeBuffer = [];

function setMobileHint() {
  const hint = document.getElementById('hintText');
  if (!revealed) hint.textContent = 'Shake to Reveal';
}

function detectMotion() {
  isMobile = true;
  setMobileHint();
  window.addEventListener('devicemotion', (e) => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
    const now = Date.now();
    shakeBuffer.push({ mag, t: now });
    shakeBuffer = shakeBuffer.filter(x => now - x.t < 500);
    const peak = Math.max(...shakeBuffer.map(x => x.mag));
    if (peak > 22 && now - lastShake > 1200) {
      lastShake = now;
      reveal();
    }
  });
}

if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
  // iOS 13+ — request permission on first tap
  document.getElementById('ballWrap').addEventListener('click', async () => {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm === 'granted') detectMotion();
    } catch(e) {}
  }, { once: true });
} else if (typeof DeviceMotionEvent !== 'undefined') {
  // Android / other — motion available without permission
  detectMotion();
}

makeStars();

// Diagnostic: test all answers and show which ones render blank
_fontReady.then(() => {
  const blanks = [];
  const svg = document.getElementById('ballSvg');
  answers.forEach(a => {
    // Temporarily run layout and check if it produces any lines
    const g = document.getElementById('triText');
    const before = g.innerHTML;
    layoutTriangleText(a.text);
    if (g.innerHTML === '') blanks.push(a.text);
    g.innerHTML = before;
  });
  if (blanks.length > 0) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;background:rgba(200,0,0,0.85);color:#fff;padding:10px;font-size:12px;font-family:monospace;z-index:9999;border-radius:8px;';
    el.innerHTML = '<b>BLANK ANSWERS:</b><br>' + blanks.map(t => '• ' + t).join('<br>');
    document.body.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:10px;left:10px;background:rgba(0,150,0,0.85);color:#fff;padding:8px 14px;font-size:12px;font-family:monospace;z-index:9999;border-radius:8px;';
    el.textContent = '✓ All answers render OK';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
});
</script>
